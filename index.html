<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>אימון שלי</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#14171a">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="אימון טיימר">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d0f12;
    --surface:rgba(22,26,31,0.85);
    --surface-solid:#161a1f;
    --surface-2:rgba(30,36,43,0.92);
    --border:rgba(255,255,255,0.10);
    --border-bright:rgba(255,255,255,0.17);
    --text:#f0ede8;
    --text-dim:#8a95a0;
    --accent:#ff6b1a;
    --accent-glow:rgba(255,107,26,0.35);
    --accent-rest:#22d3c8;
    --accent-rest-ex:#3a8fae;
    --danger:#ff4757;
    --radius:20px;
    --radius-sm:13px;
    --glass:blur(18px) saturate(1.6);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%; margin:0;}
  body{
    background:#0d0f12;
    color:var(--text);
    font-family:'Heebo',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    overscroll-behavior:none;
  }
  #app{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    position:relative;
    overflow:hidden;
  }

  /* ── GLOBAL BG WITH SPORT PHOTO ── */
  #app-bg{
    position:fixed;
    inset:0;
    max-width:480px;
    left:50%; transform:translateX(-50%);
    z-index:0;
    pointer-events:none;
  }
  #app-bg::after{
    content:'';
    position:absolute; inset:0;
    background:linear-gradient(180deg,
      rgba(13,15,18,0.55) 0%,
      rgba(13,15,18,0.72) 40%,
      rgba(13,15,18,0.97) 100%
    );
    z-index:1;
  }
  #app-bg img{
    width:100%; height:100%; object-fit:cover;
    object-position:center 30%;
    display:block;
    transition:opacity 1.2s ease;
    opacity:0;
  }
  #app-bg img.loaded{opacity:1;}
  #app > *{position:relative; z-index:2;}

  .mono{font-family:'Roboto Mono',monospace; font-variant-numeric:tabular-nums;}

  /* ---------- generic ---------- */
  .screen{
    flex:1; display:flex; flex-direction:column;
    padding:18px 18px 28px;
    animation:fadeIn .32s cubic-bezier(.22,1,.36,1);
  }
  @keyframes fadeIn{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);}}
  @keyframes popIn{from{opacity:0; transform:scale(.92);} to{opacity:1; transform:scale(1);}}

  .topbar{display:flex; align-items:center; gap:10px; margin-bottom:18px;}
  .topbar h1{font-size:20px; font-weight:800; margin:0; flex:1; text-shadow:0 2px 12px rgba(0,0,0,.6);}
  .topbar .sub{font-size:13px; color:var(--text-dim); margin-top:2px;}

  /* Glass topbar on inner screens */
  .screen-editor > .topbar,
  .screen-session .session-head .topbar,
  .screen-done > .topbar {
    background:rgba(13,15,18,0.55);
    backdrop-filter:var(--glass);
    -webkit-backdrop-filter:var(--glass);
    border-radius:var(--radius);
    padding:10px 12px;
    border:1px solid var(--border-bright);
    margin-bottom:16px;
  }

  .icon-btn{
    width:44px; height:44px; flex:none;
    display:flex; align-items:center; justify-content:center;
    border-radius:50%;
    background:rgba(255,255,255,0.08);
    backdrop-filter:var(--glass);
    -webkit-backdrop-filter:var(--glass);
    border:1px solid var(--border-bright);
    color:var(--text);
    cursor:pointer;
    transition:transform .1s ease, background .15s ease;
  }
  .icon-btn svg{width:20px; height:20px;}
  .icon-btn.danger{color:var(--danger);}
  .icon-btn:active{transform:scale(.90); background:rgba(255,255,255,0.14);}

  .btn{
    appearance:none; border:none; cursor:pointer;
    font-family:inherit; font-weight:700; font-size:15px;
    border-radius:var(--radius-sm);
    padding:14px 18px;
    display:flex; align-items:center; justify-content:center; gap:8px;
    transition:transform .1s ease, box-shadow .15s ease;
    color:var(--text);
    background:rgba(255,255,255,0.07);
    backdrop-filter:var(--glass);
    -webkit-backdrop-filter:var(--glass);
    border:1px solid var(--border-bright);
  }
  .btn:active{transform:scale(.97);}
  .btn svg{width:18px; height:18px;}
  .btn-primary{
    background:linear-gradient(135deg,#ff7a33,#ff4500);
    color:#fff; border-color:transparent;
    box-shadow:0 4px 20px var(--accent-glow), 0 1px 0 rgba(255,255,255,.15) inset;
    text-shadow:0 1px 4px rgba(0,0,0,.3);
  }
  .btn-primary:active{box-shadow:0 2px 8px var(--accent-glow);}
  .btn-rest{
    background:linear-gradient(135deg,#22d3c8,#0fb8b0);
    color:#03211f; border-color:transparent;
    box-shadow:0 4px 18px rgba(34,211,200,.3);
  }
  .btn-danger{background:transparent; color:var(--danger); border-color:rgba(255,71,87,.35);}
  .btn-ghost{background:transparent; border-color:var(--border); color:var(--text-dim);}
  .btn-block{width:100%;}
  .btn-lg{padding:18px 20px; font-size:17px; border-radius:var(--radius);}
  .btn-row{display:flex; gap:10px;}
  .btn-row .btn{flex:1;}
  .btn[disabled]{opacity:.35; pointer-events:none;}

  /* ---------- HOME HERO ---------- */
  .home-header{
    padding:24px 2px 20px;
  }
  .home-header .greeting{
    font-size:12px; font-weight:700; color:var(--accent);
    text-transform:uppercase; letter-spacing:.1em; margin-bottom:6px;
    display:flex; align-items:center; gap:6px;
  }
  .home-header .greeting::before{
    content:''; display:block; width:18px; height:2px;
    background:var(--accent); border-radius:1px;
  }
  .home-header h1{
    font-size:26px; font-weight:800; margin:0; line-height:1.15;
    text-shadow:0 2px 16px rgba(0,0,0,.7);
  }
  .home-header h1 span{color:var(--accent);}

  /* ---------- empty state ---------- */
  .empty-state{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; color:var(--text-dim); gap:14px; padding:30px 10px;
  }
  .empty-state .glyph{
    width:72px; height:72px; border-radius:50%;
    background:rgba(255,107,26,0.12); border:1px solid rgba(255,107,26,0.3);
    display:flex; align-items:center; justify-content:center; color:var(--accent);
    box-shadow:0 0 30px rgba(255,107,26,0.15);
  }
  .empty-state .glyph svg{width:30px; height:30px;}
  .empty-state h2{color:var(--text); font-size:18px; margin:0;}
  .empty-state p{margin:0; font-size:14px; line-height:1.6; max-width:280px;}

  /* ---------- plan cards ---------- */
  .plan-list{display:flex; flex-direction:column; gap:14px; flex:1;}
  .plan-card{
    border-radius:var(--radius); overflow:hidden;
    position:relative; min-height:140px;
    display:flex; flex-direction:column;
    border:1px solid var(--border-bright);
    box-shadow:0 8px 32px rgba(0,0,0,.4);
    animation:popIn .3s cubic-bezier(.22,1,.36,1) both;
  }
  .plan-card-bg{
    position:absolute; inset:0; z-index:0;
    background-size:cover; background-position:center;
    transition:transform .4s ease;
  }
  .plan-card:active .plan-card-bg{transform:scale(1.04);}
  .plan-card-overlay{
    position:absolute; inset:0; z-index:1;
    background:linear-gradient(135deg,
      rgba(13,15,18,0.85) 0%,
      rgba(13,15,18,0.55) 60%,
      rgba(13,15,18,0.32) 100%
    );
  }
  .plan-card-body{position:relative; z-index:2; padding:16px; display:flex; flex-direction:column; gap:10px; flex:1;}
  .plan-card-top{display:flex; align-items:flex-start; gap:12px;}
  .plan-card-icon{
    width:36px; height:36px; border-radius:10px; flex:none;
    background:rgba(255,107,26,0.18); border:1px solid rgba(255,107,26,0.4);
    display:flex; align-items:center; justify-content:center; color:var(--accent);
  }
  .plan-card-icon svg{width:18px; height:18px;}
  .plan-card-title{font-size:18px; font-weight:800; margin:0; flex:1; text-shadow:0 2px 8px rgba(0,0,0,.6);}
  .plan-card-meta{font-size:12px; color:rgba(240,237,232,0.7); display:flex; gap:14px; flex-wrap:wrap;}
  .plan-card-meta span{display:flex; align-items:center; gap:5px;}
  .plan-card-meta svg{width:13px; height:13px;}
  .plan-card-actions{display:flex; gap:8px; align-items:center;}
  .plan-card-actions .btn-primary{flex:1; padding:12px 16px; font-size:14px; border-radius:var(--radius-sm);}
  .plan-card-actions .icon-btn{background:rgba(255,255,255,0.1); border-color:rgba(255,255,255,0.15);}

  .fab-row{margin-top:18px;}
  .footer-credit{
    text-align:center; font-size:11px; color:var(--text-dim); opacity:.5;
    margin-top:24px; line-height:1.6;
  }

  /* ---------- editor ---------- */
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:12px; color:var(--text-dim); margin-bottom:6px; font-weight:700; text-transform:uppercase; letter-spacing:.05em;}
  .field input, .field textarea{
    width:100%;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    border:1px solid var(--border-bright);
    color:var(--text); border-radius:var(--radius-sm); padding:12px 14px;
    font-family:inherit; font-size:15px; font-weight:600;
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  .field input:focus, .field textarea:focus{
    outline:none; border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(255,107,26,0.18);
  }
  .field-row{display:flex; gap:10px;}
  .field-row .field{flex:1;}

  .mode-toggle{
    display:flex; gap:4px;
    background:rgba(255,255,255,0.06);
    backdrop-filter:var(--glass); -webkit-backdrop-filter:var(--glass);
    border:1px solid var(--border-bright); border-radius:var(--radius-sm); padding:4px;
  }
  .mode-btn{
    flex:1; appearance:none; border:none; background:transparent; cursor:pointer;
    font-family:inherit; font-weight:700; font-size:13px; color:var(--text-dim);
    padding:10px 4px; border-radius:8px; transition:background .15s ease, color .15s ease;
  }
  .mode-btn.active{background:linear-gradient(135deg,#ff7a33,#ff4500); color:#fff;}
  .mode-btn:active{transform:scale(.97);}

  .section-label{
    font-size:11px; font-weight:800; color:var(--text-dim);
    text-transform:uppercase; letter-spacing:.1em;
    margin:24px 0 12px;
    display:flex; align-items:center; gap:10px;
  }
  .section-label:first-child{margin-top:0;}
  .section-label::after{content:''; flex:1; height:1px; background:var(--border);}

  .ex-card{
    background:rgba(255,255,255,0.04);
    backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    border:1px solid var(--border-bright);
    border-radius:var(--radius); padding:14px; margin-bottom:12px;
    transition:border-color .2s ease;
  }
  .ex-card:focus-within{border-color:rgba(255,107,26,0.4);}
  .ex-card-head{display:flex; align-items:center; gap:10px; margin-bottom:12px;}
  .ex-num{
    width:30px; height:30px; border-radius:10px; flex:none;
    background:rgba(255,107,26,0.15); border:1px solid rgba(255,107,26,0.3);
    display:flex; align-items:center; justify-content:center;
    font-size:13px; font-weight:800; color:var(--accent);
  }
  .ex-card-head .field{flex:1; margin-bottom:0; position:relative;}
  .ex-card-actions{display:flex; gap:6px; flex-wrap:wrap; margin-top:10px;}
  .ex-card-actions .icon-btn{width:36px; height:36px;}
  .ex-card-actions .icon-btn svg{width:16px; height:16px;}

  .suggest-list{
    position:absolute; top:calc(100% + 4px); right:0; left:0; z-index:40;
    background:rgba(22,26,31,0.97);
    backdrop-filter:var(--glass); -webkit-backdrop-filter:var(--glass);
    border:1px solid var(--border-bright); border-radius:var(--radius-sm);
    max-height:190px; overflow-y:auto; box-shadow:0 10px 32px rgba(0,0,0,.6);
  }
  .suggest-list:empty{display:none;}
  .suggest-item{
    display:block; width:100%; text-align:right; padding:11px 12px; font-size:14px;
    font-family:inherit; color:var(--text); background:none; border:none;
    border-bottom:1px solid var(--border); cursor:pointer;
  }
  .suggest-item:last-child{border-bottom:none;}
  .suggest-item:active, .suggest-item:hover{background:rgba(255,255,255,0.06);}
  .adv-panel{
    margin-top:12px; padding-top:12px; border-top:1px dashed rgba(255,255,255,0.1);
  }
  .adv-panel .field{margin-bottom:0;}
  .adv-panel .field input::placeholder{color:#5d6469; font-weight:500;}

  .add-ex-btn{
    border:1.5px dashed rgba(255,255,255,0.18); background:transparent; color:var(--text-dim);
  }

  /* ---------- session ---------- */
  .session-head{margin-bottom:16px;}
  .session-head .plan-name{font-size:13px; color:var(--text-dim); font-weight:700;}
  .session-head .progress-text{font-size:15px; font-weight:800; margin-top:2px;}
  .segments{display:flex; gap:4px; margin-top:10px;}
  .segments .seg{flex:1; height:5px; border-radius:3px; background:rgba(255,255,255,0.09);}
  .segments .seg.done{background:var(--accent-rest);}
  .segments .seg.current{
    background:linear-gradient(90deg, var(--accent), #ff4500);
    box-shadow:0 0 8px var(--accent-glow);
  }

  .session-main{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; gap:14px; padding:10px 0;
  }

  .ex-image-wrap{
    position:relative;
    width:100%; max-width:290px; aspect-ratio:4/3;
    border-radius:var(--radius); overflow:hidden;
    background:rgba(255,255,255,0.05); border:1px solid var(--border-bright);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 8px 40px rgba(0,0,0,.5);
  }
  .ex-image-wrap img{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block; transition:opacity .6s ease-in-out; transform-origin:center center;}
  .ex-image-wrap img.frame-a{animation:gifFrameA 3.6s ease-in-out infinite, gifZoomA 7.2s ease-in-out infinite;}
  .ex-image-wrap img.frame-b{animation:gifFrameB 3.6s ease-in-out infinite, gifZoomB 7.2s ease-in-out infinite; opacity:0;}
  @keyframes gifFrameA{0%,40%{opacity:1;} 50%,90%{opacity:0;} 100%{opacity:1;}}
  @keyframes gifFrameB{0%,40%{opacity:0;} 50%,90%{opacity:1;} 100%{opacity:0;}}
  @keyframes gifZoomA{0%,100%{transform:scale(1);} 50%{transform:scale(1.055);}}
  @keyframes gifZoomB{0%,100%{transform:scale(1.055);} 50%{transform:scale(1);}}
  @media (prefers-reduced-motion: reduce){
    .ex-image-wrap img.frame-a, .ex-image-wrap img.frame-b{animation:none !important; transform:none !important;}
    .ex-image-wrap img.frame-a{opacity:1;}
    .ex-image-wrap img.frame-b{opacity:0;}
  }
  .ex-image-fallback{display:flex; flex-direction:column; align-items:center; gap:8px; color:var(--text-dim);}
  .ex-image-fallback svg{width:36px; height:36px;}
  .ex-image-fallback span{font-size:12px;}

  .ex-title{font-size:26px; font-weight:800; margin:4px 0 0; text-shadow:0 2px 12px rgba(0,0,0,.6);}
  .ex-subtitle{font-size:15px; color:var(--text-dim); font-weight:600;}
  .ex-subtitle b{color:var(--text); font-family:'Roboto Mono',monospace;}

  .next-up{font-size:13px; color:var(--text-dim);}
  .next-up b{color:var(--text);}

  .ring-wrap{position:relative; width:248px; height:248px; margin:6px 0;}
  .ring-wrap svg{width:100%; height:100%; transform:rotate(-90deg);}
  .ring-track{fill:none; stroke:rgba(255,255,255,0.08); stroke-width:10;}
  .ring-progress{fill:none; stroke-width:10; stroke-linecap:round; transition:stroke-dashoffset 1s linear, stroke .3s ease;}
  .ring-tick{stroke:rgba(255,255,255,0.12); stroke-width:2;}
  .ring-center{
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:4px;
  }
  .ring-time{font-size:50px; font-weight:700; font-family:'Roboto Mono',monospace; letter-spacing:.02em; text-shadow:0 2px 16px rgba(0,0,0,.5);}
  .ring-phase{font-size:12px; font-weight:800; letter-spacing:.08em; text-transform:uppercase;}
  .ring-phase.rest{color:var(--accent-rest);}
  .ring-phase.rest-ex{color:var(--accent-rest-ex);}
  .ring-phase.active{color:var(--accent);}

  .session-actions{
    position:sticky; bottom:0; padding-top:16px; margin-top:auto;
    background:linear-gradient(to top, rgba(13,15,18,1) 65%, transparent);
  }
  .rest-adjust{display:flex; gap:10px; margin-bottom:10px;}
  .rest-adjust .btn{flex:1;}

  .wake-badge{
    display:flex; align-items:center; gap:6px; justify-content:center;
    font-size:11px; color:var(--text-dim); margin-top:10px;
  }
  .wake-badge svg{width:13px; height:13px;}
  .wake-badge.on{color:var(--accent-rest);}

  /* ---------- done ---------- */
  .done-screen{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:18px;}
  .done-glyph{
    width:92px; height:92px; border-radius:50%;
    background:linear-gradient(135deg,#ff7a33,#ff4500); color:#fff;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 0 0 16px rgba(255,107,26,0.12), 0 8px 32px rgba(255,107,26,0.4);
    animation:popIn .5s cubic-bezier(.22,1,.36,1) .1s both;
  }
  .done-glyph svg{width:44px; height:44px;}
  .done-screen h2{font-size:26px; margin:0; text-shadow:0 2px 12px rgba(0,0,0,.5);}
  .done-screen p{margin:0; color:var(--text-dim); font-size:14px;}

  /* ---------- modal ---------- */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(5,7,9,.75);
    backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
    display:flex; align-items:center; justify-content:center; padding:20px; z-index:50;
    animation:fadeIn .18s ease;
  }
  .modal-card{
    background:rgba(22,26,31,0.97);
    backdrop-filter:var(--glass); -webkit-backdrop-filter:var(--glass);
    border:1px solid var(--border-bright); border-radius:var(--radius);
    padding:22px; max-width:340px; width:100%; text-align:center;
    animation:popIn .22s cubic-bezier(.22,1,.36,1);
    box-shadow:0 24px 64px rgba(0,0,0,.6);
  }
  .modal-card h3{margin:0 0 8px; font-size:18px;}
  .modal-card p{margin:0 0 18px; font-size:14px; color:var(--text-dim); line-height:1.6;}

  /* ---------- radio widget ---------- */
  .radio-widget{
    position:fixed; bottom:18px; left:18px; z-index:80;
    width:52px; height:52px; border-radius:50%;
    background:rgba(30,36,43,0.9);
    backdrop-filter:var(--glass); -webkit-backdrop-filter:var(--glass);
    border:1px solid var(--border-bright);
    display:flex; align-items:center; justify-content:center;
    color:var(--text-dim); cursor:pointer; padding:0;
    box-shadow:0 6px 20px rgba(0,0,0,.5);
    transition:background .2s ease, color .2s ease, border-color .2s ease, transform .15s ease;
  }
  .radio-widget svg{width:23px; height:23px; display:block;}
  .radio-widget:active{transform:scale(.93);}
  .radio-widget .radio-icon-pause{display:none;}
  .radio-widget.playing{background:linear-gradient(135deg,#ff7a33,#ff4500); color:#fff; border-color:transparent; box-shadow:0 4px 20px var(--accent-glow);}
  .radio-widget.playing .radio-icon-play{display:none;}
  .radio-widget.playing .radio-icon-pause{display:block;}
  .radio-widget.loading{animation:radioPulseBtn 1s ease-in-out infinite;}
  @keyframes radioPulseBtn{0%,100%{opacity:1;} 50%{opacity:.45;}}
  .radio-dot{
    position:absolute; top:4px; left:4px; width:11px; height:11px; border-radius:50%;
    background:var(--danger); border:2px solid rgba(22,26,31,0.9); display:none;
  }
  .radio-widget.playing .radio-dot{display:block; border-color:transparent; animation:radioDotPulse 1.4s ease-in-out infinite;}
  @keyframes radioDotPulse{0%,100%{opacity:1; transform:scale(1);} 50%{opacity:.35; transform:scale(1.3);}}
</style>
</head>
<body>

const EXERCISE_NAME_SUGGESTIONS = Object.keys(HE_PHRASES);
function suggestExerciseNames(query){
  const q = (query||'').trim().toLowerCase();
  if(!q) return [];
  const starts=[], contains=[];
  for(const name of EXERCISE_NAME_SUGGESTIONS){
    const n = name.toLowerCase();
    if(n===q) continue; // already an exact match, no need to suggest itself
    if(n.startsWith(q)) starts.push(name);
    else if(n.includes(q)) contains.push(name);
  }
  return [...starts, ...contains].slice(0,6);
}

function searchDB(keywords){
  keywords = [...new Set(keywords.map(k=>k.toLowerCase()))].filter(Boolean);
  if(!keywords.length) return null;
  let best=null, bestScore=0;
  for(const ex of EX_DB){
    const n = ex.n.toLowerCase();
    let score=0;
    for(const k of keywords) if(n.includes(k)) score++;
    if(score===0) continue;
    if(!best || score>bestScore || (score===bestScore && ex.n.length<best.n.length)){
      best=ex; bestScore=score;
    }
  }
  if(!best) return null;
  return { a: IMG_BASE+best.i, b: best.i2 ? IMG_BASE+best.i2 : (IMG_BASE+best.i) };
}

function findExerciseImage(name){
  if(!name) return null;
  const norm = name.trim().toLowerCase();
  if(!norm) return null;

  // 1) exact phrase containment match
  let bestPhraseEn=null, bestPhraseLen=0;
  for(const he in HE_PHRASES){
    const heLower = he.toLowerCase();
    if(norm.includes(heLower) && heLower.length>bestPhraseLen){
      bestPhraseEn = HE_PHRASES[he];
      bestPhraseLen = heLower.length;
    }
  }
  if(bestPhraseEn){
    const hit = searchDB(bestPhraseEn.split(' '));
    if(hit) return hit;
  }

  // 2) word-by-word fallback
  const words = norm.split(/[\s,.\-־'"׳()]+/).filter(Boolean);
  let keywords=[];
  for(const w of words){
    if(HE_WORDS[w]) keywords.push(...HE_WORDS[w]);
    else if(/^[a-z]+$/.test(w)) keywords.push(w);
  }
  if(!keywords.length) return null;
  return searchDB(keywords);
}

/* =========================================================
   Helpers
   ========================================================= */
function escapeHtml(s){
  return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8);}
function fmtTime(sec){
  sec = Math.max(0, Math.round(sec));
  const m = Math.floor(sec/60), s = sec%60;
  return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}
function clampNum(v, def, min){
  const n = parseInt(v,10);
  if(isNaN(n)) return def;
  return Math.max(min==null?0:min, n);
}
function getTimeSeconds(ex){
  return clampNum(ex.timeSeconds,30,1);
}
function fmtSecondsLabel(sec){
  sec = Math.max(0, Math.round(sec));
  return sec+' שניות';
}
function exTargetLabel(ex){
  return ex.mode==='time' ? fmtSecondsLabel(getTimeSeconds(ex)) : (ex.reps||'');
}

/* =========================================================
   Storage
   Tries the Claude-artifact persistent storage API first (window.storage).
   When the file is saved/opened as a standalone page in a browser,
   window.storage doesn't exist, so we fall back to localStorage,
   which persists on this device/browser between visits.
   ========================================================= */
const LOCAL_STORAGE_KEY = 'workoutAppPlans_v1';
function hasArtifactStorage(){
  return typeof window!=='undefined' && window.storage && typeof window.storage.get==='function' && typeof window.storage.set==='function';
}
async function loadPlans(){
  if(hasArtifactStorage()){
    try{
      const res = await window.storage.get('plans', false);
      if(res && res.value) return JSON.parse(res.value);
    }catch(e){ /* no stored plans yet */ }
    return [];
  }
  try{
    const raw = localStorage.getItem(LOCAL_STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){ /* localStorage unavailable */ }
  return [];
}
async function savePlans(plans){
  if(hasArtifactStorage()){
    try{
      await window.storage.set('plans', JSON.stringify(plans), false);
    }catch(e){ console.warn('storage save failed', e); }
    return;
  }
  try{
    localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(plans));
  }catch(e){ console.warn('storage save failed', e); }
}

/* =========================================================
   Audio / vibration
   ========================================================= */
let audioCtx=null;
function ensureAudio(){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
  }catch(e){}
}
function beep(freq,dur,vol){
  if(!audioCtx) return;
  try{
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.frequency.value = freq;
    osc.type='sine';
    gain.gain.value = vol==null?0.25:vol;
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start();
    gain.gain.setValueAtTime(gain.gain.value, audioCtx.currentTime+dur*0.6);
    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime+dur);
    osc.stop(audioCtx.currentTime+dur);
  }catch(e){}
}
function playTick(){ beep(900,0.09,0.18); if(navigator.vibrate) navigator.vibrate(35); }
function playEndSound(){
  beep(660,0.16,0.3);
  setTimeout(()=>beep(990,0.28,0.3),170);
  if(navigator.vibrate) navigator.vibrate([130,90,130]);
}

/* =========================================================
   Wake lock
   ========================================================= */
async function requestWakeLock(){
  if(!state.session) return;
  try{
    if('wakeLock' in navigator){
      const wl = await navigator.wakeLock.request('screen');
      state.session.wakeLock = wl;
      wl.addEventListener('release', ()=>{ if(state.session) state.session.wakeLock=null; updateWakeBadge(); });
    }
  }catch(e){ /* permission / unsupported */ }
  updateWakeBadge();
}
function releaseWakeLock(){
  if(state.session && state.session.wakeLock){
    try{ state.session.wakeLock.release(); }catch(e){}
    state.session.wakeLock=null;
  }
}
document.addEventListener('visibilitychange', ()=>{
  if(document.visibilityState==='visible' && state.screen==='session' && state.session && !state.session.wakeLock){
    requestWakeLock();
  }
});

const RADIO_STREAM_URL = 'https://glzwizzlv.bynetcdn.com/glglz_mp3';
function setupRadio(){
  const btn = document.getElementById('radio-widget');
  const audio = document.getElementById('radio-audio');
  if(!btn || !audio) return;

  function setBtnState(cls){
    btn.classList.remove('playing','loading');
    if(cls) btn.classList.add(cls);
  }

  btn.addEventListener('click', ()=>{
    ensureAudio();
    if(audio.paused){
      if(!audio.src) audio.src = RADIO_STREAM_URL;
      setBtnState('loading');
      const p = audio.play();
      if(p && typeof p.catch==='function'){
        p.catch(()=>{ setBtnState(null); });
      }
    }else{
      audio.pause();
    }
  });

  audio.addEventListener('playing', ()=> setBtnState('playing'));
  audio.addEventListener('waiting', ()=> setBtnState('loading'));
  audio.addEventListener('pause', ()=> setBtnState(null));
  audio.addEventListener('ended', ()=> setBtnState(null));
  audio.addEventListener('error', ()=> setBtnState(null));
}

function ringGeometry(){
  const r=104, c=2*Math.PI*r;
  return {r,c};
}
function renderRingSvg(){
  const {r,c} = ringGeometry();
  let ticks='';
  for(let i=0;i<12;i++){
    const a = (i/12)*2*Math.PI;
    const x1 = 120 + Math.cos(a)*115, y1 = 120 + Math.sin(a)*115;
    const x2 = 120 + Math.cos(a)*108, y2 = 120 + Math.sin(a)*108;
    ticks += `<line class="ring-tick" x1="${x1.toFixed(2)}" y1="${y1.toFixed(2)}" x2="${x2.toFixed(2)}" y2="${y2.toFixed(2)}"/>`;
  }
  return `<svg viewBox="0 0 240 240">
    ${ticks}
    <circle class="ring-track" cx="120" cy="120" r="${r}"/>
    <circle id="ring-progress" class="ring-progress" cx="120" cy="120" r="${r}" stroke-dasharray="${c.toFixed(2)}" stroke-dashoffset="0"/>
  </svg>`;
}

      ${renderRingSvg()}
      <div class="ring-center">
        <div class="ring-time mono" id="ring-time">${fmtTime(s.secondsLeft)}</div>
        <div class="ring-phase active">ביצוע התרגיל</div>
      </div>
    </div>
    <div class="session-actions">
      <div class="rest-adjust">
        <button class="btn" data-action="adjust-rest" data-delta="-15">15-</button>
        <button class="btn" data-action="adjust-rest" data-delta="15">15+</button>
      </div>
      <button class="btn btn-primary btn-block btn-lg" data-action="finish-set">${icon('check')}<span>סיימתי מוקדם</span></button>
      <button class="btn btn-ghost btn-block" data-action="confirm-skip-ex" style="margin-top:10px">${icon('skip')}<span>דילוג על התרגיל</span></button>
    </div>`;
  }else{ // restSet / restExercise
    const isExRest = s.phase==='restExercise';
    const phaseLabel = isExRest ? 'מנוחה לפני התרגיל הבא' : 'מנוחה בין סטים';
    const phaseClass = isExRest ? 'rest-ex' : 'rest';
    let nextLine='';
    if(isExRest && nextEx){
      nextLine = `<div class="next-up">בהמשך: <b>${escapeHtml(nextEx.name||'תרגיל')}</b> &middot; ${nextEx.sets} סטים &middot; ${escapeHtml(exTargetLabel(nextEx))}</div>`;
    }else if(!isExRest){
      nextLine = `<div class="next-up">התרגיל הנוכחי: <b>${escapeHtml(ex.name||'תרגיל')}</b> &middot; סט הבא ${s.setIndex} מתוך ${ex.sets} &middot; ${escapeHtml(exTargetLabel(ex))}</div>`;
    }
    main = `
    <div class="ring-wrap">
      ${renderRingSvg()}
      <div class="ring-center">
        <div class="ring-time mono" id="ring-time">${fmtTime(s.secondsLeft)}</div>
        <div class="ring-phase ${phaseClass}">${phaseLabel}</div>
      </div>
    </div>
    ${nextLine}
    <div class="session-actions">
      <div class="rest-adjust">
        <button class="btn" data-action="adjust-rest" data-delta="-15">15-</button>
        <button class="btn" data-action="adjust-rest" data-delta="15">15+</button>
      </div>
      <button class="btn btn-rest btn-block btn-lg" data-action="skip-rest">${icon('skip')}<span>דילוג על המנוחה</span></button>
    </div>`;
  }

  const wakeOn = !!s.wakeLock;
  const wakeSupported = ('wakeLock' in navigator);

  return `<div class="screen">
    <div class="session-head">
      <div class="topbar" style="margin-bottom:0;">
        <button class="icon-btn" data-action="confirm-exit" aria-label="עצירת אימון">${icon('x')}</button>
        <div style="flex:1; text-align:center;">
          <div class="plan-name">${escapeHtml(plan.name)}</div>
          <div class="progress-text">תרגיל ${s.exIndex+1} מתוך ${plan.exercises.length}</div>
        </div>
        <div style="width:42px"></div>
      </div>
      <div class="segments">${segs}</div>
    </div>
    <div class="session-main">
      ${main}
    </div>
    ${wakeSupported ? `<div class="wake-badge ${wakeOn?'on':''}">${icon(wakeOn?'lock':'unlock')}<span>${wakeOn?'המסך יישאר דלוק במהלך האימון':'לא ניתן לנעול את המסך במצב זה'}</span></div>` : ''}
  </div>`;
}

function renderDone(){
  return `<div class="screen">
    <div class="done-screen">
      <div class="done-glyph">${icon('check')}</div>
      <h2>כל הכבוד, סיימת את האימון!</h2>
      <p>${escapeHtml(state.session?state.session.plan.name:'')}</p>
      <button class="btn btn-primary btn-lg" data-action="finish-done">חזרה לדף הבית</button>
    </div>
  </div>`;
}

function renderModal(){
  const m = state.modal;
  return `<div class="modal-overlay" data-action="modal-overlay">
    <div class="modal-card">
      <h3>${escapeHtml(m.title)}</h3>
      <p>${escapeHtml(m.body)}</p>
      <div class="btn-row">
        <button class="btn btn-ghost" data-action="modal-cancel">ביטול</button>
        <button class="btn ${m.danger?'btn-danger':'btn-primary'}" data-action="modal-confirm">${escapeHtml(m.confirmLabel)}</button>
      </div>
    </div>
  </div>`;
}

/* =========================================================
   Timer tick animation (per-second, without full re-render)
   ========================================================= */
let tickInterval=null;
function startTickAnimation(){
  updateRingDisplay();
}
function updateRingDisplay(){
  const s = state.session;
  if(!s) return;
  const timeEl = document.getElementById('ring-time');
  const ringEl = document.getElementById('ring-progress');
  if(!timeEl || !ringEl) return;
  timeEl.textContent = fmtTime(s.secondsLeft);
  const {c} = ringGeometry();
  const total = s.totalSeconds || 1;
  const fraction = Math.max(0, Math.min(1, s.secondsLeft/total));
  ringEl.style.strokeDashoffset = (c*(1-fraction)).toFixed(2);
  ringEl.style.stroke = s.phase==='restExercise' ? 'var(--accent-rest-ex)' : (s.phase==='restSet' ? 'var(--accent-rest)' : 'var(--accent)');
}
function updateWakeBadge(){
  if(state.screen==='session') render();
}

/* =========================================================
   Session logic
   ========================================================= */
function startSession(plan){
  // attach resolved image to each exercise (best-effort lookup)
  const exercises = plan.exercises.map(e=>({...e, _img: findExerciseImage(e.name)}));
  state.session = {
    plan: {...plan, exercises},
    exIndex:0,
    setIndex:1,
    phase:'active',
    secondsLeft:0,
    totalSeconds:0,
    timerId:null,
    completeFn:null,
    wakeLock:null
  };
  state.screen='session';
  ensureAudio();
  requestWakeLock();
  enterActivePhase();
}

function currentExercise(){ return state.session.plan.exercises[state.session.exIndex]; }
function getRestSet(ex,plan){ return (ex.restSet!==''&&ex.restSet!=null) ? clampNum(ex.restSet,0,0) : clampNum(plan.defaultRestSet,60,0); }
function getRestExercise(ex,plan){ return (ex.restExercise!==''&&ex.restExercise!=null) ? clampNum(ex.restExercise,0,0) : clampNum(plan.defaultRestExercise,90,0); }

// Enter the 'active' phase for the current exercise/set: starts a countdown
// for time-based exercises, or simply renders the rep-based screen.
function enterActivePhase(){
  const s = state.session;
  const ex = currentExercise();
  s.phase = 'active';
  if(ex.mode==='time'){
    startActiveTimer(getTimeSeconds(ex));
  }else{
    s.completeFn = null;
    render();
  }
}

function finishSet(){
  ensureAudio();
  const s = state.session;
  clearInterval(s.timerId);
  const plan = s.plan;
  const ex = currentExercise();
  if(s.setIndex < ex.sets){
    s.setIndex++;
    startRest('restSet', getRestSet(ex,plan));
  }else{
    if(s.exIndex < plan.exercises.length-1){
      startRest('restExercise', getRestExercise(ex,plan));
    }else{
      finishWorkout();
    }
  }
}
function skipExercise(){
  const s = state.session;
  clearInterval(s.timerId);
  const plan = s.plan;
  if(s.exIndex < plan.exercises.length-1){
    startRest('restExercise', getRestExercise(currentExercise(),plan));
  }else{
    finishWorkout();
  }
}
function finishWorkout(){
  clearInterval(state.session.timerId);
  releaseWakeLock();
  state.screen='done';
  render();
}

function startRest(phase, seconds){
  const s = state.session;
  s.phase = phase;
  s.totalSeconds = Math.max(1, seconds);
  s.secondsLeft = Math.max(0, seconds);
  s.completeFn = endRest;
  render();
  if(s.secondsLeft<=0){ endRest(); return; }
  runTicker();
}
// Countdown for a time-based exercise set (e.g. plank, wall sit).
function startActiveTimer(seconds){
  const s = state.session;
  s.totalSeconds = Math.max(1, seconds);
  s.secondsLeft = Math.max(0, seconds);
  s.completeFn = finishSet;
  render();
  if(s.secondsLeft<=0){ finishSet(); return; }
  runTicker();
}
function runTicker(){
  const s = state.session;
  clearInterval(s.timerId);
  s.timerId = setInterval(()=>{
    s.secondsLeft--;
    if(s.secondsLeft<=0){
      clearInterval(s.timerId);
      playEndSound();
      (s.completeFn||endRest)();
    }else{
      if(s.secondsLeft<=3) playTick();
      updateRingDisplay();
    }
  },1000);
}
function endRest(){
  const s = state.session;
  if(s.phase==='restExercise'){
    s.exIndex++;
    s.setIndex=1;
  }
  enterActivePhase();
}
function skipRest(){
  const s = state.session;
  clearInterval(s.timerId);
  endRest();
}
function adjustRest(delta){
  const s = state.session;
  s.secondsLeft = Math.max(0, s.secondsLeft+delta);
  s.totalSeconds = Math.max(s.totalSeconds, s.secondsLeft, 1);
  updateRingDisplay();
  if(s.secondsLeft<=0){ clearInterval(s.timerId); (s.completeFn||endRest)(); }
}

/* =========================================================
   Editor logic
   ========================================================= */
function openEditor(plan){
  state.editorDraft = plan ? JSON.parse(JSON.stringify(plan)) : defaultPlan();
  state.advOpen = new Set();
  state.screen='editor';
  render();
}
function setBind(path, index, value){
  const d = state.editorDraft;
  if(path.startsWith('ex.')){
    const key = path.slice(3);
    d.exercises[index][key] = value;
  }else{
    d[path] = value;
  }
}

/* =========================================================
   Event delegation
   ========================================================= */
app.addEventListener('click', async (e)=>{
  const t = e.target.closest('[data-action]');
  if(!t) return;
  const action = t.dataset.action;
  const id = t.dataset.id;
  const index = t.dataset.index!=null ? parseInt(t.dataset.index,10) : null;

  switch(action){
    case 'new-plan':
      openEditor(null);
      break;
    case 'load-example':
      state.plans.push(exampleWorkout());
      await savePlans(state.plans);
      render();
      break;
    case 'edit-plan':
      openEditor(state.plans.find(p=>p.id===id));
      break;
    case 'start-plan': {
      const plan = state.plans.find(p=>p.id===id);
      if(plan && plan.exercises.length) startSession(plan);
      break;
    }
    case 'delete-plan':
      state.modal = {
        title:'מחיקת תוכנית',
        body:'האם למחוק את התוכנית? לא ניתן לשחזר אותה.',
        confirmLabel:'מחיקה',
        danger:true,
        onConfirm: async ()=>{
          state.plans = state.plans.filter(p=>p.id!==id);
          await savePlans(state.plans);
        }
      };
      render();
      break;

    // editor
    case 'cancel-edit':
      state.editorDraft=null;
      state.screen='home';
      render();
      break;
    case 'save-plan': {
      const d = state.editorDraft;
      d.name = (d.name||'').trim() || 'תוכנית ללא שם';
      d.defaultRestSet = clampNum(d.defaultRestSet,60,0);
      d.defaultRestExercise = clampNum(d.defaultRestExercise,90,0);
      d.exercises = d.exercises.map(ex=>({
        name:(ex.name||'').trim(),
        sets: clampNum(ex.sets,3,1),
        mode: ex.mode==='time' ? 'time' : 'reps',
        reps:(ex.reps||'').toString().trim() || '10',
        timeSeconds: clampNum(ex.timeSeconds,30,1),
        restSet: ex.restSet===''||ex.restSet==null ? '' : clampNum(ex.restSet,0,0),
        restExercise: ex.restExercise===''||ex.restExercise==null ? '' : clampNum(ex.restExercise,0,0)
      })).filter(ex=>ex.name);
      const idx = state.plans.findIndex(p=>p.id===d.id);
      if(idx>=0) state.plans[idx]=d; else state.plans.push(d);
      await savePlans(state.plans);
      state.editorDraft=null;
      state.screen='home';
      render();
      break;
    }
    case 'add-ex':
      state.editorDraft.exercises.push(defaultExercise());
      render();
      break;
    case 'remove-ex':
      state.editorDraft.exercises.splice(index,1);
      state.advOpen.delete(index);
      render();
      break;
    case 'move-up':
      if(index>0){
        const arr=state.editorDraft.exercises;
        [arr[index-1],arr[index]]=[arr[index],arr[index-1]];
        render();
      }
      break;
    case 'move-down':
      if(index < state.editorDraft.exercises.length-1){
        const arr=state.editorDraft.exercises;
        [arr[index+1],arr[index]]=[arr[index],arr[index+1]];
        render();
      }
      break;
    case 'toggle-adv':
      if(state.advOpen.has(index)) state.advOpen.delete(index);
      else state.advOpen.add(index);
      render();
      break;
    case 'set-mode':
      state.editorDraft.exercises[index].mode = t.dataset.mode==='time' ? 'time' : 'reps';
      if(state.editorDraft.exercises[index].mode==='time' && !state.editorDraft.exercises[index].timeSeconds){
        state.editorDraft.exercises[index].timeSeconds = 30;
      }
      render();
      break;
    case 'pick-suggestion':
      state.editorDraft.exercises[index].name = t.dataset.value;
      render();
      break;

    // session
    case 'finish-set':
      finishSet();
      break;
    case 'confirm-skip-ex':
      state.modal = {
        title:'דילוג על התרגיל',
        body:'לדלג על התרגיל הנוכחי ולעבור למנוחה לפני התרגיל הבא?',
        confirmLabel:'דילוג',
        danger:false,
        onConfirm: ()=>{ skipExercise(); }
      };
      render();
      break;
    case 'skip-rest':
      skipRest();
      break;
    case 'adjust-rest':
      adjustRest(parseInt(t.dataset.delta,10));
      break;
    case 'confirm-exit':
      state.modal = {
        title:'עצירת האימון',
        body:'האם לעצור את האימון ולחזור לדף הבית?',
        confirmLabel:'עצירה',
        danger:true,
        onConfirm: ()=>{
          clearInterval(state.session.timerId);
          releaseWakeLock();
          state.session=null;
          state.screen='home';
        }
      };
      render();
      break;

    case 'finish-done':
      state.session=null;
      state.screen='home';
      render();
      break;

    // modal
    case 'modal-overlay':
    case 'modal-cancel':
      state.modal=null;
      render();
      break;
    case 'modal-confirm': {
      const m = state.modal;
      state.modal=null;
      if(m && m.onConfirm) await m.onConfirm();
      render();
      break;
    }
  }
});

app.addEventListener('input', (e)=>{
  const t = e.target;
  if(!t.dataset || !t.dataset.bind) return;
  const index = t.dataset.index!=null ? parseInt(t.dataset.index,10) : null;
  setBind(t.dataset.bind, index, t.value);

  if(t.dataset.suggest==='name' && index!=null){
    const box = document.getElementById('suggest-'+index);
    if(!box) return;
    const matches = suggestExerciseNames(t.value);
    box.innerHTML = matches.map(name=>
      `<button type="button" class="suggest-item" data-action="pick-suggestion" data-index="${index}" data-value="${escapeHtml(name)}">${escapeHtml(name)}</button>`
    ).join('');
  }
});

app.addEventListener('focusout', (e)=>{
  const t = e.target;
  if(!t.dataset || t.dataset.suggest!=='name') return;
  const index = t.dataset.index;
  // small delay so a click on a suggestion registers before we clear the list
  setTimeout(()=>{
    const box = document.getElementById('suggest-'+index);
    if(box) box.innerHTML='';
  }, 150);
});

/* =========================================================
   Init
   ========================================================= */
async function init(){
  state.plans = await loadPlans();
  render();
  setupRadio();
}
init();

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('service-worker.js').catch(()=>{ /* offline support unavailable */ });
  });
}

})();
</script>
