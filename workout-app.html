<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>אימון שלי</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14171a;
    --surface:#1f2327;
    --surface-2:#282d32;
    --border:#363c42;
    --text:#f3efe8;
    --text-dim:#98a0a7;
    --accent:#ff7a33;
    --accent-rest:#3fb6ad;
    --accent-rest-ex:#3a8fae;
    --danger:#e6555b;
    --radius:18px;
    --radius-sm:12px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Heebo',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  #app{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    position:relative;
    background:
      radial-gradient(900px 500px at 50% -10%, rgba(255,122,51,0.08), transparent 60%),
      var(--bg);
  }
  .mono{font-family:'Roboto Mono',monospace; font-variant-numeric:tabular-nums;}

  /* ---------- generic ---------- */
  .screen{
    flex:1;
    display:flex;
    flex-direction:column;
    padding:18px 18px 24px;
    animation:fadeIn .28s ease;
  }
  @keyframes fadeIn{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

  .topbar{
    display:flex; align-items:center; gap:10px;
    margin-bottom:18px;
  }
  .topbar h1{font-size:20px; font-weight:800; margin:0; flex:1;}
  .topbar .sub{font-size:13px; color:var(--text-dim); margin-top:2px;}

  .icon-btn{
    width:42px; height:42px; flex:none;
    display:flex; align-items:center; justify-content:center;
    border-radius:50%;
    background:var(--surface);
    border:1px solid var(--border);
    color:var(--text);
    cursor:pointer;
  }
  .icon-btn svg{width:20px; height:20px;}
  .icon-btn.danger{color:var(--danger);}
  .icon-btn:active{transform:scale(.94);}

  .btn{
    appearance:none; border:none; cursor:pointer;
    font-family:inherit; font-weight:700; font-size:15px;
    border-radius:var(--radius-sm);
    padding:14px 18px;
    display:flex; align-items:center; justify-content:center; gap:8px;
    transition:transform .08s ease;
    color:var(--text);
    background:var(--surface-2);
    border:1px solid var(--border);
  }
  .btn:active{transform:scale(.98);}
  .btn svg{width:18px; height:18px;}
  .btn-primary{background:var(--accent); color:#1a1208; border-color:var(--accent);}
  .btn-rest{background:var(--accent-rest); color:#08231f; border-color:var(--accent-rest);}
  .btn-danger{background:transparent; color:var(--danger); border-color:rgba(230,85,91,.4);}
  .btn-ghost{background:transparent; border-color:var(--border); color:var(--text-dim);}
  .btn-block{width:100%;}
  .btn-lg{padding:18px 20px; font-size:17px; border-radius:var(--radius);}
  .btn-row{display:flex; gap:10px;}
  .btn-row .btn{flex:1;}
  .btn[disabled]{opacity:.4; pointer-events:none;}

  /* ---------- home ---------- */
  .empty-state{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; color:var(--text-dim); gap:14px; padding:30px 10px;
  }
  .empty-state .glyph{
    width:64px; height:64px; border-radius:50%;
    background:var(--surface); border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center; color:var(--accent);
  }
  .empty-state .glyph svg{width:28px; height:28px;}
  .empty-state h2{color:var(--text); font-size:18px; margin:0;}
  .empty-state p{margin:0; font-size:14px; line-height:1.6; max-width:280px;}

  .plan-list{display:flex; flex-direction:column; gap:12px; flex:1;}
  .plan-card{
    background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius); padding:16px;
    display:flex; flex-direction:column; gap:12px;
  }
  .plan-card-top{display:flex; align-items:flex-start; gap:12px;}
  .plan-card-title{font-size:17px; font-weight:800; margin:0; flex:1;}
  .plan-card-meta{font-size:13px; color:var(--text-dim); margin-top:4px; display:flex; gap:14px; flex-wrap:wrap;}
  .plan-card-meta span{display:flex; align-items:center; gap:5px;}
  .plan-card-meta svg{width:14px; height:14px;}
  .plan-card-actions{display:flex; gap:8px;}

  .fab-row{margin-top:16px;}

  .footer-credit{
    text-align:center; font-size:11px; color:var(--text-dim); opacity:.6;
    margin-top:22px; line-height:1.6;
  }

  /* ---------- editor ---------- */
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:12px; color:var(--text-dim); margin-bottom:6px; font-weight:700;}
  .field input, .field textarea{
    width:100%; background:var(--surface); border:1px solid var(--border);
    color:var(--text); border-radius:var(--radius-sm); padding:12px 14px;
    font-family:inherit; font-size:15px; font-weight:600;
  }
  .field input:focus, .field textarea:focus{outline:2px solid var(--accent); outline-offset:1px;}
  .field-row{display:flex; gap:10px;}
  .field-row .field{flex:1;}

  .section-label{
    font-size:12px; font-weight:800; color:var(--text-dim);
    text-transform:uppercase; letter-spacing:.06em;
    margin:22px 0 10px;
  }
  .section-label:first-child{margin-top:0;}

  .ex-card{
    background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius); padding:14px; margin-bottom:12px;
  }
  .ex-card-head{display:flex; align-items:center; gap:10px; margin-bottom:12px;}
  .ex-num{
    width:28px; height:28px; border-radius:50%; flex:none;
    background:var(--surface-2); border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    font-size:13px; font-weight:800; color:var(--accent);
  }
  .ex-card-head .field{flex:1; margin-bottom:0;}
  .ex-card-actions{display:flex; gap:6px; flex-wrap:wrap; margin-top:10px;}
  .ex-card-actions .icon-btn{width:36px; height:36px;}
  .ex-card-actions .icon-btn svg{width:16px; height:16px;}
  .adv-panel{
    margin-top:12px; padding-top:12px; border-top:1px dashed var(--border);
  }
  .adv-panel .field{margin-bottom:0;}
  .adv-panel .field input::placeholder{color:#5d6469; font-weight:500;}

  .add-ex-btn{
    border:1.5px dashed var(--border); background:transparent; color:var(--text-dim);
  }

  /* ---------- session ---------- */
  .session-head{margin-bottom:16px;}
  .session-head .plan-name{font-size:13px; color:var(--text-dim); font-weight:700;}
  .session-head .progress-text{font-size:15px; font-weight:800; margin-top:2px;}
  .segments{display:flex; gap:4px; margin-top:10px;}
  .segments .seg{flex:1; height:5px; border-radius:3px; background:var(--surface-2);}
  .segments .seg.done{background:var(--accent-rest);}
  .segments .seg.current{background:var(--accent);}

  .session-main{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; gap:14px; padding:10px 0;
    position:relative;
  }

  /* Exercise background image — fills the session-main area */
  .ex-bg{
    position:absolute; inset:0; z-index:0;
    background-size:cover; background-position:center top;
    background-repeat:no-repeat;
    border-radius:var(--radius);
    transition:background-image .3s ease;
  }
  .ex-bg::after{
    content:'';
    position:absolute; inset:0;
    background:linear-gradient(
      to bottom,
      rgba(20,23,26,0.55) 0%,
      rgba(20,23,26,0.30) 35%,
      rgba(20,23,26,0.75) 70%,
      rgba(20,23,26,0.97) 100%
    );
    border-radius:inherit;
  }
  .session-main > *:not(.ex-bg){position:relative; z-index:1;}

  .ex-title{font-size:24px; font-weight:800; margin:4px 0 0;}
  .ex-subtitle{font-size:15px; color:var(--text-dim); font-weight:600;}
  .ex-subtitle b{color:var(--text); font-family:'Roboto Mono',monospace;}

  .next-up{font-size:13px; color:var(--text-dim);}
  .next-up b{color:var(--text);}

  .ring-wrap{position:relative; width:240px; height:240px; margin:6px 0;}
  .ring-wrap svg{width:100%; height:100%; transform:rotate(-90deg);}
  .ring-track{fill:none; stroke:var(--surface-2); stroke-width:10;}
  .ring-progress{fill:none; stroke-width:10; stroke-linecap:round; transition:stroke-dashoffset 1s linear, stroke .3s ease;}
  .ring-tick{stroke:var(--border); stroke-width:2;}
  .ring-center{
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:4px;
  }
  .ring-time{font-size:46px; font-weight:700; font-family:'Roboto Mono',monospace; letter-spacing:.02em;}
  .ring-phase{font-size:13px; font-weight:800; letter-spacing:.04em; text-transform:uppercase;}
  .ring-phase.rest{color:var(--accent-rest);}
  .ring-phase.rest-ex{color:var(--accent-rest-ex);}

  .session-actions{
    position:sticky; bottom:0; padding-top:14px; margin-top:auto;
    background:linear-gradient(to top, var(--bg) 60%, transparent);
  }
  .rest-adjust{display:flex; gap:10px; margin-bottom:10px;}
  .rest-adjust .btn{flex:1;}

  .wake-badge{
    display:flex; align-items:center; gap:6px; justify-content:center;
    font-size:11px; color:var(--text-dim); margin-top:10px;
  }
  .wake-badge svg{width:13px; height:13px;}
  .wake-badge.on{color:var(--accent-rest);}

  /* ---------- done ---------- */
  .done-screen{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:16px;}
  .done-glyph{
    width:84px; height:84px; border-radius:50%; background:var(--accent); color:#1a1208;
    display:flex; align-items:center; justify-content:center;
  }
  .done-glyph svg{width:40px; height:40px;}
  .done-screen h2{font-size:24px; margin:0;}
  .done-screen p{margin:0; color:var(--text-dim); font-size:14px;}

  /* ---------- modal ---------- */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(10,12,14,.6);
    display:flex; align-items:center; justify-content:center; padding:20px; z-index:50;
    animation:fadeIn .15s ease;
  }
  .modal-card{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    padding:20px; max-width:340px; width:100%; text-align:center;
  }
  .modal-card h3{margin:0 0 8px; font-size:17px;}
  .modal-card p{margin:0 0 16px; font-size:14px; color:var(--text-dim); line-height:1.6;}
</style>
</head>

function searchDB(keywords){
  keywords = [...new Set(keywords.map(k=>k.toLowerCase()))].filter(Boolean);
  if(!keywords.length) return null;
  let best=null, bestScore=0;
  for(const ex of EX_DB){
    const n = ex.n.toLowerCase();
    let score=0;
    for(const k of keywords) if(n.includes(k)) score++;
    if(score===0) continue;
    if(!best || score>bestScore || (score===bestScore && ex.n.length<best.n.length)){

  }

  const norm = name.trim().toLowerCase();
  if(!norm) return null;

  // 1) exact phrase containment match
  let bestPhraseEn=null, bestPhraseLen=0;
  for(const he in HE_PHRASES){
    const heLower = he.toLowerCase();
    if(norm.includes(heLower) && heLower.length>bestPhraseLen){
      bestPhraseEn = HE_PHRASES[he];
      bestPhraseLen = heLower.length;
    }
  }
  if(bestPhraseEn){
    const hit = searchDB(bestPhraseEn.split(' '));
    if(hit) return hit;
  }

  // 2) word-by-word fallback
  const words = norm.split(/[\s,.\-־'"׳()]+/).filter(Boolean);
  let keywords=[];
  for(const w of words){
    if(HE_WORDS[w]) keywords.push(...HE_WORDS[w]);
    else if(/^[a-z]+$/.test(w)) keywords.push(w);
  }
  if(!keywords.length) return null;
  return searchDB(keywords);
}

/* =========================================================

function escapeHtml(s){
  return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8);}
function fmtTime(sec){
  sec = Math.max(0, Math.round(sec));
  const m = Math.floor(sec/60), s = sec%60;
  return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}
function clampNum(v, def, min){
  const n = parseInt(v,10);
  if(isNaN(n)) return def;
  return Math.max(min==null?0:min, n);
}

/* =========================================================
   Audio / vibration
   ========================================================= */
let audioCtx=null;
function ensureAudio(){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
  }catch(e){}
}
function beep(freq,dur,vol){
  if(!audioCtx) return;
  try{
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.frequency.value = freq;
    osc.type='sine';
    gain.gain.value = vol==null?0.25:vol;
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start();
    gain.gain.setValueAtTime(gain.gain.value, audioCtx.currentTime+dur*0.6);
    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime+dur);
    osc.stop(audioCtx.currentTime+dur);
  }catch(e){}
}
function playTick(){ beep(900,0.09,0.18); if(navigator.vibrate) navigator.vibrate(35); }
function playEndSound(){
  beep(660,0.16,0.3);
  setTimeout(()=>beep(990,0.28,0.3),170);
  if(navigator.vibrate) navigator.vibrate([130,90,130]);
}

/* =========================================================
   Wake lock
   ========================================================= */
async function requestWakeLock(){
  if(!state.session) return;
  try{
    if('wakeLock' in navigator){
      const wl = await navigator.wakeLock.request('screen');
      state.session.wakeLock = wl;
      wl.addEventListener('release', ()=>{ if(state.session) state.session.wakeLock=null; updateWakeBadge(); });
    }
  }catch(e){ /* permission / unsupported */ }
  updateWakeBadge();
}
function releaseWakeLock(){
  if(state.session && state.session.wakeLock){
    try{ state.session.wakeLock.release(); }catch(e){}
    state.session.wakeLock=null;
  }
}
document.addEventListener('visibilitychange', ()=>{
  if(document.visibilityState==='visible' && state.screen==='session' && state.session && !state.session.wakeLock){
    requestWakeLock();
  }
});

function ringGeometry(){
  const r=104, c=2*Math.PI*r;
  return {r,c};
}
function renderRingSvg(){
  const {r,c} = ringGeometry();
  let ticks='';
  for(let i=0;i<12;i++){
    const a = (i/12)*2*Math.PI;
    const x1 = 120 + Math.cos(a)*115, y1 = 120 + Math.sin(a)*115;
    const x2 = 120 + Math.cos(a)*108, y2 = 120 + Math.sin(a)*108;
    ticks += `<line class="ring-tick" x1="${x1.toFixed(2)}" y1="${y1.toFixed(2)}" x2="${x2.toFixed(2)}" y2="${y2.toFixed(2)}"/>`;
  }
  return `<svg viewBox="0 0 240 240">
    ${ticks}
    <circle class="ring-track" cx="120" cy="120" r="${r}"/>
    <circle id="ring-progress" class="ring-progress" cx="120" cy="120" r="${r}" stroke-dasharray="${c.toFixed(2)}" stroke-dashoffset="0"/>
  </svg>`;
}

/* =========================================================
   Timer tick animation (per-second, without full re-render)
   ========================================================= */
let tickInterval=null;
function startTickAnimation(){
  updateRingDisplay();
}
function updateRingDisplay(){
  const s = state.session;
  if(!s) return;
  const timeEl = document.getElementById('ring-time');
  const ringEl = document.getElementById('ring-progress');
  if(!timeEl || !ringEl) return;
  timeEl.textContent = fmtTime(s.secondsLeft);
  const {c} = ringGeometry();
  const total = s.totalSeconds || 1;
  const fraction = Math.max(0, Math.min(1, s.secondsLeft/total));
  ringEl.style.strokeDashoffset = (c*(1-fraction)).toFixed(2);
  ringEl.style.stroke = s.phase==='restExercise' ? 'var(--accent-rest-ex)' : 'var(--accent-rest)';
}
function updateWakeBadge(){
  if(state.screen==='session') render();
}

/* =========================================================
   Session logic
   ========================================================= */
function startSession(plan){
  // attach resolved image to each exercise (best-effort lookup)
  const exercises = plan.exercises.map(e=>({...e, _img: findExerciseImage(e.name)}));
  state.session = {
    plan: {...plan, exercises},
    exIndex:0,
    setIndex:1,
    phase:'active',
    secondsLeft:0,
    totalSeconds:0,
    timerId:null,
    wakeLock:null
  };
  state.screen='session';
  render();
  ensureAudio();
  requestWakeLock();
}

function currentExercise(){ return state.session.plan.exercises[state.session.exIndex]; }
function getRestSet(ex,plan){ return (ex.restSet!==''&&ex.restSet!=null) ? clampNum(ex.restSet,0,0) : clampNum(plan.defaultRestSet,60,0); }
function getRestExercise(ex,plan){ return (ex.restExercise!==''&&ex.restExercise!=null) ? clampNum(ex.restExercise,0,0) : clampNum(plan.defaultRestExercise,90,0); }

function finishSet(){
  ensureAudio();
  const s = state.session;
  const plan = s.plan;
  const ex = currentExercise();
  if(s.setIndex < ex.sets){
    s.setIndex++;
    startRest('restSet', getRestSet(ex,plan));
  }else{
    if(s.exIndex < plan.exercises.length-1){
      startRest('restExercise', getRestExercise(ex,plan));
    }else{
      finishWorkout();
    }
  }
}
function skipExercise(){
  const s = state.session;
  const plan = s.plan;
  if(s.exIndex < plan.exercises.length-1){
    startRest('restExercise', getRestExercise(currentExercise(),plan));
  }else{
    finishWorkout();
  }
}
function finishWorkout(){
  clearInterval(state.session.timerId);
  releaseWakeLock();
  state.screen='done';
  render();
}

function startRest(phase, seconds){
  const s = state.session;
  s.phase = phase;
  s.totalSeconds = Math.max(1, seconds);
  s.secondsLeft = Math.max(0, seconds);
  render();
  if(s.secondsLeft<=0){ endRest(); return; }
  runTicker();
}
function runTicker(){
  const s = state.session;
  clearInterval(s.timerId);
  s.timerId = setInterval(()=>{
    s.secondsLeft--;
    if(s.secondsLeft<=0){
      clearInterval(s.timerId);
      playEndSound();
      endRest();
    }else{
      if(s.secondsLeft<=3) playTick();
      updateRingDisplay();
    }
  },1000);
}
function endRest(){
  const s = state.session;
  if(s.phase==='restExercise'){
    s.exIndex++;
    s.setIndex=1;
  }
  s.phase='active';
  render();
}
function skipRest(){
  const s = state.session;
  clearInterval(s.timerId);
  endRest();
}
function adjustRest(delta){
  const s = state.session;
  s.secondsLeft = Math.max(0, s.secondsLeft+delta);
  s.totalSeconds = Math.max(s.totalSeconds, s.secondsLeft, 1);
  updateRingDisplay();
  if(s.secondsLeft<=0){ clearInterval(s.timerId); endRest(); }
}

/* =========================================================
   Editor logic
   ========================================================= */
function openEditor(plan){
  state.editorDraft = plan ? JSON.parse(JSON.stringify(plan)) : defaultPlan();
  state.advOpen = new Set();
  state.screen='editor';
  render();
}
function setBind(path, index, value){
  const d = state.editorDraft;
  if(path.startsWith('ex.')){
    const key = path.slice(3);
    d.exercises[index][key] = value;
  }else{
    d[path] = value;
  }
}

/* =========================================================
   Event delegation
   ========================================================= */
app.addEventListener('click', async (e)=>{
  const t = e.target.closest('[data-action]');
  if(!t) return;
  const action = t.dataset.action;
  const id = t.dataset.id;
  const index = t.dataset.index!=null ? parseInt(t.dataset.index,10) : null;

  switch(action){
    case 'new-plan':
      openEditor(null);
      break;
    case 'load-example':
      state.plans.push(exampleWorkout());
      await savePlans(state.plans);
      render();
      break;
    case 'edit-plan':
      openEditor(state.plans.find(p=>p.id===id));
      break;
    case 'start-plan': {
      const plan = state.plans.find(p=>p.id===id);
      if(plan && plan.exercises.length) startSession(plan);
      break;
    }
    case 'delete-plan':
      state.modal = {
        title:'מחיקת תוכנית',
        body:'האם למחוק את התוכנית? לא ניתן לשחזר אותה.',
        confirmLabel:'מחיקה',
        danger:true,
        onConfirm: async ()=>{
          state.plans = state.plans.filter(p=>p.id!==id);
          await savePlans(state.plans);
        }
      };
      render();
      break;

    // editor
    case 'cancel-edit':
      state.editorDraft=null;
      state.screen='home';
      render();
      break;
    case 'save-plan': {
      const d = state.editorDraft;
      d.name = (d.name||'').trim() || 'תוכנית ללא שם';
      d.defaultRestSet = clampNum(d.defaultRestSet,60,0);
      d.defaultRestExercise = clampNum(d.defaultRestExercise,90,0);
      d.exercises = d.exercises.map(ex=>({
        name:(ex.name||'').trim(),
        sets: clampNum(ex.sets,3,1),
        reps:(ex.reps||'').toString().trim() || '10',
        restSet: ex.restSet===''||ex.restSet==null ? '' : clampNum(ex.restSet,0,0),
        restExercise: ex.restExercise===''||ex.restExercise==null ? '' : clampNum(ex.restExercise,0,0)
      })).filter(ex=>ex.name);
      const idx = state.plans.findIndex(p=>p.id===d.id);
      if(idx>=0) state.plans[idx]=d; else state.plans.push(d);
      await savePlans(state.plans);
      state.editorDraft=null;
      state.screen='home';
      render();
      break;
    }
    case 'add-ex':
      state.editorDraft.exercises.push(defaultExercise());
      render();
      break;
    case 'remove-ex':
      state.editorDraft.exercises.splice(index,1);
      state.advOpen.delete(index);
      render();
      break;
    case 'move-up':
      if(index>0){
        const arr=state.editorDraft.exercises;
        [arr[index-1],arr[index]]=[arr[index],arr[index-1]];
        render();
      }
      break;
    case 'move-down':
      if(index < state.editorDraft.exercises.length-1){
        const arr=state.editorDraft.exercises;
        [arr[index+1],arr[index]]=[arr[index],arr[index+1]];
        render();
      }
      break;
    case 'toggle-adv':
      if(state.advOpen.has(index)) state.advOpen.delete(index);
      else state.advOpen.add(index);
      render();
      break;

    // session
    case 'finish-set':
      finishSet();
      break;
    case 'confirm-skip-ex':
      state.modal = {
        title:'דילוג על התרגיל',
        body:'לדלג על התרגיל הנוכחי ולעבור למנוחה לפני התרגיל הבא?',
        confirmLabel:'דילוג',
        danger:false,
        onConfirm: ()=>{ skipExercise(); }
      };
      render();
      break;
    case 'skip-rest':
      skipRest();
      break;
    case 'adjust-rest':
      adjustRest(parseInt(t.dataset.delta,10));
      break;
    case 'confirm-exit':
      state.modal = {
        title:'עצירת האימון',
        body:'האם לעצור את האימון ולחזור לדף הבית?',
        confirmLabel:'עצירה',
        danger:true,
        onConfirm: ()=>{
          clearInterval(state.session.timerId);
          releaseWakeLock();
          state.session=null;
          state.screen='home';
        }
      };
      render();
      break;

    case 'finish-done':
      state.session=null;
      state.screen='home';
      render();
      break;

    // modal
    case 'modal-overlay':
    case 'modal-cancel':
      state.modal=null;
      render();
      break;
    case 'modal-confirm': {
      const m = state.modal;
      state.modal=null;
      if(m && m.onConfirm) await m.onConfirm();
      render();
      break;
    }
  }
});

app.addEventListener('input', (e)=>{
  const t = e.target;
  if(!t.dataset || !t.dataset.bind) return;
  const index = t.dataset.index!=null ? parseInt(t.dataset.index,10) : null;
  setBind(t.dataset.bind, index, t.value);
});

/* =========================================================
   Init
   ========================================================= */
async function init(){
  state.plans = await loadPlans();
  render();
}
init();

})();
</script>
